<!DOCTYPE html>
<html>
  <head>
    <title>Производственная платформа</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Цифровая платформа для управления производственными процессами</h1>
      <nav>
        <ul>
          <li><a href="#">Главная</a></li>
          <li><a href="#">Процессы</a></li>
          <li><a href="#">Отчеты</a></li>
          <li><a href="#">Настройки</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="login-section">
        <h2>Вход</h2>
        <form id="login-form">
          <input type="text" id="username" placeholder="Имя пользователя" required>
          <button type="submit">Войти</button>
        </form>
      </section>
      <section id="app-section" style="display: none;">
        <h2>Добро пожаловать, <span id="user-name"></span></h2>
        <section>
          <h2>Процессы</h2>
          <ul id="process-list"></ul>
          <form id="process-form">
            <input type="text" id="process-name" placeholder="Название процесса" required>
            <input type="date" id="process-start" placeholder="Дата начала" required>
            <input type="date" id="process-end" placeholder="Дата окончания">
            <input type="text" id="process-task" placeholder="Задача" required>
            <input type="text" id="process-employees" placeholder="Сотрудники (через запятую)" required>
            <button type="submit">Добавить процесс</button>
          </form>
        </section>
      </section>
    </main>
    <footer>
      <p>&copy; 2024 Производственная платформа</p>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
