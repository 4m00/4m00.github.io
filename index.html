<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ElectricShop</title>
</head>
<body>
    <div class="container">
        <div class="inner">
            <div class="item">
                <p class="txt1">AirPods Pro 2</p>
                <img src="1.png" alt="" class="img">
                <p class="txt2">9000 ₽</p>
                <button class="btn" id="btn1">Купить</button>
            </div>
            <div class="item">
                <p class="txt1">AirPods 3</p>
                <img src="2.png" alt="" class="img">
                <p class="txt2">8000 ₽</p>
                <button class="btn" id="btn2">Купить</button>
            </div>
        </div>
    </div>
    <div class="usercard" id="usercard"></div>
    <button class="btn" id="cartBtn">Корзина <span id="cartCounter"></span></button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
