<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <title>ElectricShop</title>
</head>
<body>
  <div class="container">
    <div class="inner">
      <div class="item">
        <p class="txt1">AirPods Pro 2</p>
        <img src="1.png" alt="" class="img">
        <p class="txt2">9000 ₽</p>
        <button class="buy-btn" id="buy-btn1">Купить</button>
        <div class="quantity" id="quantity-controls1">
          <button class="btn-quantity" id="minus-btn1">-</button>
          <span class="quantity-display" id="quantity1">0</span>
          <button class="btn-quantity" id="plus-btn1">+</button>
        </div>
      </div>
      <div class="item">
        <p class="txt1">AirPods 3</p>
        <img src="2.png" alt="" class="img">
        <p class="txt2">8000 ₽</p>
        <button class="buy-btn" id="buy-btn2">Купить</button>
        <div class="quantity" id="quantity-controls2">
          <button class="btn-quantity" id="minus-btn2">-</button>
          <span class="quantity-display" id="quantity2">0</span>
          <button class="btn-quantity" id="plus-btn2">+</button>
        </div>
      </div>
    </div>
  </div>
  <div class="usercard" id="usercard"></div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
