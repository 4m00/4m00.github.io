<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <title>ElectricShop</title>
</head>
<body>
  <div class="container">
    <div class="inner">
      <div class="item">
        <p class="txt1">AirPods Pro 2</p>
        <img src="1.png" alt="" class="img">
        <p class="txt2">9000 ₽</p>
        <button class="buy-btn" id="buy-btn">Купить</button>
	    <div id="quantity-controls1" class="quantity">
	      <button id="minus-btn1" class="minus-btn">-</button>
	      <span id="quantity1">0</span>
	      <button id="plus-btn1" class="plus-btn">+</button>
	    </div>
	  </div>
      <div class="item">
        <p class="txt1">AirPods 3</p>
        <img src="2.png" alt="" class="img">
        <p class="txt2">8000 ₽</p>
        <button class="buy-btn" id="buy-btn">Купить</button>
	    <div id="quantity-controls2" class="quantity">
	      <button id="minus-btn2" class="minus-btn">-</button>
	      <span id="quantity2">0</span>
	      <button id="plus-btn2" class="plus-btn">+</button>
	    </div>
	  </div>
    </div>
  </div>
  <div class="usercard" id="usercard"></div>

	<script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script src="app.js"></script>
</body>
</html>
